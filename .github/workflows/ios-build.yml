name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0.203
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.203'

      - name: Install MAUI iOS Workload
        run: |
          dotnet workload install maui-ios --version 9.0.203
          dotnet workload list

      - name: Restore Dependencies
        run: |
          dotnet restore OpenUtauMobile/OpenUtauMobile.csproj \
            -p:TargetFrameworks=net9.0-ios \
            -p:TargetFramework=net9.0-ios

      - name: Build Unsigned IPA
        run: |
          dotnet publish OpenUtauMobile/OpenUtauMobile.csproj \
            -c Release \
            -f net9.0-ios \
            -p:TargetFrameworks=net9.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:EnableCodeSigning=false \
            -p:BuildIpa=true \
            -p:MtouchLink=SdkOnly \
            -p:WarningLevel=0

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenUtauMobile-IPA
          path: OpenUtauMobile/bin/Release/net9.0-ios/ios-arm64/publish/*.ipa
